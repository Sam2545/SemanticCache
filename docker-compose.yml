services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      SEMCACHE_BACKEND: redis
      SEMCACHE_REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 2s

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
